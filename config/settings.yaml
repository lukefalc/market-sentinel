# General application settings.

environment: development
log_level: INFO
database_path: data/market_sentinel.duckdb
report_output_dir: reports
price_download_batch_size: 20
price_backfill_period: 5y
price_daily_lookback_days: 10
price_download_pause_seconds: 3
report_outputs:
  excel_dir: ~/Library/CloudStorage/OneDrive-Personal/Finance/MarketSentinel/Excel
  pdf_dir: ~/Library/CloudStorage/OneDrive-Personal/Finance/MarketSentinel/PDF
email_alerts:
  settings_source: environment_variables
  sends_automatically_from_daily_process: false
